<style>
  :root{
    color-scheme: light;
    --cream:#FCF6EC; --parchment:#F3E9D8; --card:#FFFFFF;
    --terra:#E2653A; --terra-deep:#B84B29;
    --gold:#D9A441; --gold-deep:#B7852A;
    --teal:#3D6B66; --teal-deep:#254240; --teal-tint:#E3EDEB;
    --ink:#2E2B28; --ink-soft:#6E6A63; --line:#EDE0CC;
    --good:#EFF4DE; --good-ink:#5E7A1F; --danger:#B85C4A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{background:#FCF6EC !important;}
  body{font-family:'Work Sans',sans-serif; color:#2E2B28 !important; background:#FCF6EC !important; -webkit-font-smoothing:antialiased;}
  a{color:inherit; text-decoration:none;}
  h1,h2{font-family:'Fredoka',sans-serif; font-weight:600;}

  #appShell{display:flex; min-height:100vh;}
  @media (max-width:900px){ #appShell{flex-direction:column;} }

  .sidebar{
    width:230px; flex-shrink:0; background:var(--teal-deep); color:#E3EDEB;
    padding:22px 18px; display:flex; flex-direction:column; gap:24px;
    position:sticky; top:0; height:100vh;
  }
  @media (max-width:900px){ .sidebar{width:100%; height:auto; position:relative; padding:14px 16px; gap:14px;} }
  .sb-brand{display:flex; align-items:center; gap:10px;}
  .sb-brand svg{width:26px; height:26px; flex-shrink:0;}
  .sb-brand-text{font-family:'Fredoka',sans-serif; font-weight:600; font-size:15px; color:#E3EDEB;}
  .sb-brand-text em{font-style:normal; color:var(--terra);}

  nav.sb-nav{display:flex; flex-direction:column; gap:2px;}
  @media (max-width:900px){ nav.sb-nav{display:none;} nav.sb-nav.open{display:flex; position:absolute; top:100%; left:0; right:0; background:var(--teal-deep); padding:10px 14px 16px; z-index:30; box-shadow:0 12px 24px rgba(0,0,0,.25);} }
  .sb-nav button{
    display:flex; align-items:center; gap:10px;
    font-family:'Work Sans',sans-serif; font-size:13.5px; font-weight:500;
    color:#9FC0BA; padding:9px 10px; border-radius:8px;
    background:none; border:none; cursor:pointer; width:100%; text-align:left;
  }
  .sb-nav button:hover{background:#2F4F4C; color:#E3EDEB;}
  .sb-nav button.active{background:var(--terra); color:#fff;}
  .sb-nav .dot{width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.6; flex-shrink:0;}
  .nav-badge{
    margin-left:auto; font-family:'Space Mono',monospace; font-size:12px; font-weight:700;
    color:currentColor; opacity:.85; flex-shrink:0; display:none;
  }

  .sb-nav a{
    display:flex; align-items:center; gap:10px;
    font-family:'Work Sans',sans-serif; font-size:13px; font-weight:500;
    color:#7FA69F; padding:9px 10px; border-radius:8px; text-decoration:none;
  }
  .sb-nav a:hover{background:#2F4F4C; color:#E3EDEB;}
  .sb-nav a .link-label{flex:1;}
  .sb-nav a .ext-icon{width:12px; height:12px; flex-shrink:0; opacity:.7;}

  .hamburger-btn{display:none; background:none; border:1px solid #3E5D59; border-radius:8px; padding:0; margin-left:auto; box-sizing:border-box;}
  @media (max-width:900px){ .hamburger-btn{display:flex; flex-direction:column; gap:3px; width:34px; height:34px; align-items:center; justify-content:center;} }
  .hamburger-btn span{width:16px; height:2px; background:#E3EDEB; margin:0; border-radius:1px;}

  .sb-footer{margin-top:auto; font-family:'Space Mono',monospace; font-size:10.5px; color:#7A9C96; line-height:1.6;}
  .sb-footer button{background:none; border:none; color:#9FC0BA; font-family:'Space Mono',monospace; font-size:10.5px; cursor:pointer; padding:0; text-decoration:underline;}
  @media (max-width:900px){ .sb-footer{display:none;} }

  main{flex:1; padding:32px 36px 60px; min-width:0; position:relative;}
  @media (max-width:900px){ main{padding:20px 16px 50px;} }

  .top-right-avatar{
    position:absolute; top:28px; right:32px; width:42px; height:42px; border-radius:12px;
    border:1.5px solid var(--line); background:var(--card); display:flex; align-items:center; justify-content:center;
    overflow:hidden; z-index:5;
  }
  .top-right-avatar img{width:100%; height:100%; object-fit:cover;}
  .top-right-avatar .placeholder{font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; color:var(--ink-soft);}
  @media (max-width:900px){ .top-right-avatar{top:14px; right:16px; width:36px; height:36px;} }

  .loading, .error-state{text-align:center; padding:80px 20px; color:var(--ink-soft); font-size:14px;}
  .error-state a{color:var(--terra-deep); font-weight:600;}

  .topbar{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:26px; padding-right:64px;}
  @media (max-width:900px){ .topbar{padding-right:52px;} }
  .topbar h1{font-size:23px;}
  .plan-badge{
    font-family:'Space Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.05em;
    background:#FBEBD9; color:var(--terra-deep); border:1px solid #F0C9A8; padding:6px 13px; border-radius:16px; font-weight:700;
  }

  .stat-row{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px;}
  @media (max-width:640px){ .stat-row{grid-template-columns:1fr;} }
  .stat-card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px;}
  .stat-num{font-family:'Fredoka',sans-serif; font-size:26px; font-weight:700;}
  .stat-label{font-size:12px; color:var(--ink-soft); margin-top:2px;}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:30px 26px; text-align:center;}
  .panel svg{width:40px; height:40px; margin:0 auto 14px;}
  .panel h2{font-size:18px; margin-bottom:8px;}
  .panel p{font-size:13.5px; color:var(--ink-soft); max-width:400px; margin:0 auto 20px; line-height:1.6;}

  .board-link-box{
    display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
    background:var(--teal-tint); border:1px solid #CBE0DC; border-radius:14px; padding:16px 18px; margin-bottom:16px;
  }
  .board-link-box b{font-family:'Fredoka',sans-serif; font-size:14px; color:var(--teal-deep); display:block; margin-bottom:3px;}
  .board-url{font-family:'Space Mono',monospace; font-size:11px; color:var(--ink-soft); word-break:break-all;}
  .embed-code-box{background:var(--ink); border-radius:10px; padding:14px 16px; overflow-x:auto;}
  .embed-code-box code{font-family:'Space Mono',monospace; font-size:12px; color:#E3EDEB; white-space:pre; line-height:1.6;}
  .board-link-btn{
    background:var(--teal-deep); color:var(--cream); font-family:'Fredoka',sans-serif; font-weight:600;
    font-size:13px; padding:10px 18px; border-radius:10px; white-space:nowrap; flex:none;
  }

  .notes-list{display:flex; flex-direction:column; gap:12px;}
  .owner-note-row{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px 16px 16px; position:relative; overflow:hidden;}
  .owner-note-row::before{
    content:""; position:absolute; top:0; left:0; right:0; height:10px;
    background-image: radial-gradient(circle at 6px 6px, var(--cream) 3px, transparent 3.5px);
    background-size: 12px 10px; background-repeat:repeat-x; background-position:top center;
  }
  .note-delete-btn{
    position:absolute; top:14px; right:14px; width:28px; height:28px; border-radius:8px;
    background:transparent; border:1px solid var(--line); color:var(--ink-soft); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .note-delete-btn:hover{background:#F5E6E1; border-color:#E8C4B8; color:var(--danger);}
  .note-delete-btn svg{width:14px; height:14px;}
  .owner-note-row .note-text{font-size:13.5px; line-height:1.5; margin-bottom:8px;}
  .owner-note-row .note-meta{font-family:'Space Mono',monospace; font-size:10.5px; color:var(--ink-soft); margin-bottom:12px;}
  .response-label{font-family:'Space Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--ink-soft); display:block; margin-bottom:5px;}
  .status-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;}
  .status-opt{font-size:11px; padding:6px 11px; border-radius:14px; border:1px solid var(--line); background:var(--cream); cursor:pointer;}
  .status-opt.selected{background:var(--ink); color:var(--cream); border-color:var(--ink);}
  .status-msg{width:100%; margin-bottom:10px; padding:9px 11px; border-radius:8px; border:1px solid var(--line); font-size:12.5px; background:var(--cream); font-family:'Work Sans',sans-serif;}
  .status-save{background:transparent; border:1px solid var(--line); color:var(--ink); font-family:'Fredoka',sans-serif; font-weight:600; font-size:12.5px; padding:9px 16px; border-radius:9px; cursor:pointer;}

  .wall-toggle-row{display:flex; align-items:center; gap:9px; margin-top:12px; padding-top:12px; border-top:1px solid var(--line); font-size:12.5px; color:var(--ink-soft); cursor:pointer; user-select:none;}
  .wall-toggle{width:34px; height:19px; border-radius:10px; background:var(--line); position:relative; flex-shrink:0; transition:background .15s ease;}
  .wall-toggle::after{content:""; position:absolute; top:2px; left:2px; width:15px; height:15px; border-radius:50%; background:#fff; transition:transform .15s ease; box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .wall-toggle.on{background:var(--teal-deep);}
  .wall-toggle.on::after{transform:translateX(15px);}
  .wall-toggle-hint{font-size:11px; color:var(--ink-soft); margin-top:4px; margin-left:43px;}

  .filter-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;}
  .filter-chip{font-size:12px; padding:7px 13px; border-radius:14px; border:1px solid var(--line); background:var(--card); cursor:pointer; font-weight:500;}
  .filter-chip.active{background:var(--ink); border-color:var(--ink); color:var(--cream);}

  .plan-cards{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;}
  @media (max-width:640px){ .plan-cards{grid-template-columns:1fr;} }
  .plan-card{border:1.5px solid var(--line); border-radius:12px; padding:14px; cursor:pointer; background:var(--cream);}
  .plan-card.current{border-color:var(--terra); background:#FBEBD9;}
  .plan-card.selected{border-color:var(--teal-deep); background:var(--teal-tint);}
  .plan-card .pname{font-family:'Fredoka',sans-serif; font-weight:600; font-size:13.5px;}
  .plan-card .pprice{font-family:'Space Mono',monospace; font-size:11px; color:var(--ink-soft); margin:2px 0 6px;}
  .plan-card .pfeat{font-size:11.5px; color:var(--ink-soft); line-height:1.5;}
  .plan-card .pbadge{font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--terra-deep); font-weight:700; margin-bottom:4px;}
  .plan-change-action{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px;}
  .plan-btn-row{display:flex; gap:10px; flex-wrap:wrap;}
  .btn-stripe{background:var(--ink); color:var(--cream); font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px; padding:11px 18px; border-radius:10px; border:none; opacity:.45; cursor:not-allowed;}
  .btn-skip-payment{background:transparent; color:var(--terra-deep); font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px; padding:11px 18px; border-radius:10px; border:1.5px dashed var(--terra-deep); cursor:pointer;}
  .dev-note{font-size:11px; color:var(--ink-soft); margin-top:10px; line-height:1.5;}

  .settings-panel{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px; margin-bottom:20px;}
  .settings-panel h2{font-size:16px; margin-bottom:4px;}
  .settings-panel .desc{font-size:12.5px; color:var(--ink-soft); margin-bottom:18px;}
  .field{margin-bottom:16px;}
  .field label{font-family:'Space Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--ink-soft); display:block; margin-bottom:6px;}
  .field input{width:100%; background:var(--cream); border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:13.5px; font-family:'Work Sans',sans-serif; color:var(--ink);}
  .field input:focus{outline:2px solid var(--terra); outline-offset:1px;}
  .field-row{display:flex; gap:12px; flex-wrap:wrap;}
  .field-row .field{flex:1; min-width:200px;}
  .field-hint{font-size:11px; color:var(--ink-soft); margin-top:5px; line-height:1.5;}

  .onboard-panel{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px; margin-bottom:20px; position:relative;}
  .onboard-dismiss{position:absolute; top:16px; right:16px; width:26px; height:26px; border-radius:8px; background:var(--cream); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .onboard-dismiss svg{width:12px; height:12px;}
  .onboard-head{display:flex; align-items:center; gap:12px; margin-bottom:16px; padding-right:32px;}
  .onboard-progress-track{flex:1; height:8px; background:var(--line); border-radius:5px; overflow:hidden;}
  .onboard-progress-fill{height:100%; background:var(--terra); border-radius:5px; transition:width .3s ease;}
  .onboard-progress-label{font-family:'Space Mono',monospace; font-size:11.5px; color:var(--terra-deep); font-weight:700; white-space:nowrap;}
  .onboard-step{display:flex; gap:13px; padding:13px 4px; border-top:1px solid var(--line);}
  .onboard-step:first-of-type{border-top:none; padding-top:2px;}
  .onboard-check{width:22px; height:22px; border-radius:50%; border:2px solid var(--line); background:var(--card); flex:none; display:flex; align-items:center; justify-content:center; margin-top:1px;}
  .onboard-check svg{width:11px; height:11px; stroke:#fff; stroke-width:3; fill:none; opacity:0;}
  .onboard-step.done .onboard-check{background:var(--good-ink); border-color:var(--good-ink);}
  .onboard-step.done .onboard-check svg{opacity:1;}
  .onboard-step-body{flex:1; min-width:0;}
  .onboard-step-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .onboard-step-title{font-family:'Fredoka',sans-serif; font-size:13.5px; font-weight:600;}
  .onboard-step.done .onboard-step-title{color:var(--ink-soft); text-decoration:line-through; text-decoration-color:var(--line);}
  .onboard-step-desc{font-size:12px; color:var(--ink-soft); margin-top:3px; line-height:1.5;}
  .onboard-step.done .onboard-step-desc{opacity:.6;}
  .onboard-optional-pill{font-family:'Space Mono',monospace; font-size:8.5px; text-transform:uppercase; color:var(--ink-soft); background:var(--cream); padding:3px 7px; border-radius:5px; white-space:nowrap; flex:none;}
  .onboard-action{margin-top:8px; display:inline-flex; align-items:center; gap:5px; font-family:'Work Sans',sans-serif; font-size:12px; font-weight:600; color:var(--terra-deep); background:#FBEFE7; border:none; padding:6px 12px; border-radius:7px; cursor:pointer;}
  .onboard-step.done .onboard-action{display:none;}
  .onboard-collapsed{padding:16px 22px; cursor:pointer; transition:background .15s ease;}
  .onboard-collapsed:hover{background:var(--cream);}
  .onboard-collapsed .onboard-head{padding-right:0;}
  .onboard-expand-icon{width:16px; height:16px; flex:none;}

  .member-row{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line);}
  .member-row:first-child{padding-top:0;}
  .member-row:last-child{border-bottom:none;}
  .member-info{flex:1; min-width:0;}
  .member-name{font-family:'Fredoka',sans-serif; font-weight:600; font-size:13.5px;}
  .member-email{font-size:12px; color:var(--ink-soft); margin-top:1px;}
  .member-role-badge{font-family:'Space Mono',monospace; font-size:9.5px; text-transform:uppercase; padding:3px 9px; border-radius:6px; flex:none;}
  .member-role-badge.manager{background:#FBEBD9; color:var(--terra-deep);}
  .member-role-badge.team_member{background:var(--teal-tint); color:var(--teal-deep);}

        }

        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {

        buffer.put(PAD1, 8);

<script>
  const API_BASE = 'https://api.suggestionsbox.com.au';
  const token = localStorage.getItem('sb_token');

  let ME = null;
  let MY_NOTES = [];
  let currentNoteFilter = 'all';
  let currentNotesScope = 'all'; // 'all' | 'employee' — used by Notes vs Team Board views

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  // Marks a "did they actually look at this" onboarding step as done.
  // Fire-and-forget — never blocks the action the person is actually
  // trying to take, and quietly refreshes ME so the checklist updates
  // next time Overview renders.
  async function markOnboardingStep(step) {
    try {
      const result = await apiFetch('/api/business/onboarding', {
        method: 'POST',
        body: JSON.stringify({ step }),
      });
      ME.onboardingChecklist = result.onboardingChecklist;
    } catch {}
  }

  function showLoggedOut() {
    document.getElementById('appShell').style.display = 'none';
    document.getElementById('loggedOutShell').style.display = 'block';
  }

  async function apiFetch(path, opts = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
      ...opts,
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) },
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      const err = new Error(data.error || 'Request failed');
      err.status = res.status;
      throw err;
    }
    return data;
  }

  // A note counts as "new" once it's never had a written response — even
  // if its status has moved along (e.g. marked Seen but nothing written
  // yet still counts). Badges only show when there's actually something
  // outstanding; hidden entirely once everything's been responded to.
  function updateNavBadges() {
    function countsFor(lane) {
      const notes = MY_NOTES.filter((n) => (n.lane || 'customer') === lane);
      const unresponded = notes.filter((n) => !(n.statusHistory || []).some((h) => h.message)).length;
      return { total: notes.length, unresponded };
    }

    const customerCounts = countsFor('customer');
    const customerBadge = document.getElementById('badge-customer');
    if (customerBadge) {
      customerBadge.textContent = `(${customerCounts.unresponded})`;
      customerBadge.style.display = customerCounts.unresponded > 0 ? 'inline' : 'none';
    }

    const teamCounts = countsFor('employee');
    const teamBadge = document.getElementById('badge-team');
    if (teamBadge) {
      teamBadge.textContent = `(${teamCounts.unresponded})`;
      teamBadge.style.display = teamCounts.unresponded > 0 ? 'inline' : 'none';
    }
  }

  async function reloadMyNotes() {
    MY_NOTES = await apiFetch('/api/my-notes');

  // Keeps the sidebar "(N)" counts current without needing a manual page
  // refresh. This deliberately only refreshes the underlying data and the
  // badge numbers — it never re-renders whatever note list or form you
  // might currently have open, so it can't interrupt something you're in
  // the middle of typing. A real push-based approach (WebSockets) would
  // update instantly rather than within ~30s, but that's a genuinely new
  // piece of backend infrastructure for a fairly low-stakes count badge —
  // this gets the same practical result far more simply.
  let badgePollTimer = null;
  function startBadgePolling() {
    if (badgePollTimer) return; // already running, don't stack intervals
    badgePollTimer = setInterval(() => {
      reloadMyNotes().catch(() => {}); // a failed background check shouldn't surface an error
    }, 30000);

  function avgResponseTimeLabel(notes) {
    const times = notes
      .filter((n) => (n.statusHistory || []).length > 1)
      .map((n) => new Date(n.statusHistory[1].at) - new Date(n.statusHistory[0].at));
    if (times.length === 0) return '—';
    const avgMs = times.reduce((a, b) => a + b, 0) / times.length;
    const days = avgMs / 86400000;
    if (days < 1) return `${Math.max(1, Math.round(days * 24))}h`;
    return `${days.toFixed(1)}d`;
  }

  // Renders a lightweight SVG line/area chart of note volume over the last
  // 14 days, split into customer/team where relevant — no charting
  // library, consistent with how the QR code was built elsewhere in this
  // file. Customer and team are independent lines (not stacked), each
  // with its own soft fill down to the baseline.
  function renderVolumeChart() {
    const container = document.getElementById('volume-chart-container');
    if (!container) return;

    const days = 14;
    const buckets = [];
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - i);
      buckets.push({ date: d, customer: 0, team: 0 });
    }
    MY_NOTES.forEach((n) => {
      const created = new Date(n.createdAt);
      created.setHours(0, 0, 0, 0);
      const bucket = buckets.find((b) => b.date.getTime() === created.getTime());
      if (bucket) {
        if ((n.lane || 'customer') === 'employee') bucket.team++;
        else bucket.customer++;
      }
    });

    const maxVal = Math.max(...buckets.map((b) => Math.max(b.customer, b.team)), 1);
    const W = 640, H = 160, padBottom = 20, padTop = 10;
    const plotH = H - padBottom - padTop;
    const stepX = W / (days - 1);

    function pointsFor(key) {
      return buckets.map((b, i) => {
        const x = i * stepX;
        const y = padTop + plotH - (b[key] / maxVal) * plotH;
        return [x, y];
      });
    }

    function linePath(points) {
      return points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
    }

    function areaPath(points) {
      const baseline = padTop + plotH;
      return `${linePath(points)} L ${points[points.length - 1][0].toFixed(1)} ${baseline} L ${points[0][0].toFixed(1)} ${baseline} Z`;
    }

    const customerPoints = pointsFor('customer');
    const teamPoints = pointsFor('team');

    const labels = buckets.map((b, i) => {
      const showLabel = i === 0 || i === days - 1 || i === Math.floor(days / 2);
      if (!showLabel) return '';
      const x = i * stepX;
      const label = b.date.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
      return `<text x="${x}" y="${H - 4}" font-size="9" fill="#6E6A63" text-anchor="middle" font-family="monospace">${label}</text>`;
    }).join('');

    container.innerHTML = `
      <div class="chart-panel">
        <div class="chart-panel-head">
          <h2>Suggestion volume, last 14 days</h2>
          ${ME.employeeNotesEnabled ? `
            <div class="chart-legend">
              <span><i style="background:#E2653A;"></i>Customers</span>
              <span><i style="background:#254240;"></i>Team</span>
            </div>
          ` : ''}
        </div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:160px; display:block;">
          <defs>
            <linearGradient id="fillCustomer" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#E2653A" stop-opacity="0.18"/>
              <stop offset="100%" stop-color="#E2653A" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="fillTeam" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#254240" stop-opacity="0.16"/>
              <stop offset="100%" stop-color="#254240" stop-opacity="0"/>
            </linearGradient>
          </defs>
          ${ME.employeeNotesEnabled ? `<path d="${areaPath(teamPoints)}" fill="url(#fillTeam)"/>` : ''}
          <path d="${areaPath(customerPoints)}" fill="url(#fillCustomer)"/>
          ${ME.employeeNotesEnabled ? `<path d="${linePath(teamPoints)}" fill="none" stroke="#254240" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>` : ''}
          <path d="${linePath(customerPoints)}" fill="none" stroke="#E2653A" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${labels}
        </svg>
      </div>
    `;
  }

  function notesList(notes) {
    return `<div class="notes-list">` + notes.map((n) => {

        ${n.lane !== 'employee' ? `
          <label class="wall-toggle-row">
            <span class="wall-toggle ${n.showOnWall ? 'on' : ''}" data-wall-toggle="${n.id}"></span>
            Show on public response wall
          </label>
        ` : ''}
      </div>
    `;
    }).join('') + `</div>`;
  }

  function wireStatusControls() {
    const pending = {};
    document.querySelectorAll('[data-status]').forEach((el) => {
      el.addEventListener('click', () => {
        const noteId = el.dataset.note;
        pending[noteId] = el.dataset.status;
        document.querySelectorAll(`[data-status][data-note="${noteId}"]`).forEach((o) => o.classList.remove('selected'));
        el.classList.add('selected');
      });
    });
    document.querySelectorAll('[data-save]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const noteId = btn.dataset.save;
        const status = pending[noteId];
        if (!status) return;
        const msgInput = document.querySelector(`[data-msg="${noteId}"]`);
        btn.textContent = 'Saving…';
        btn.disabled = true;
        try {
          await apiFetch(`/api/my-notes/${noteId}/status`, {
            method: 'POST',
            body: JSON.stringify({ status, message: msgInput.value }),
          });
          await reloadMyNotes();
          if (currentNotesScope === 'all') showNotes(); else showTeamBoard();
        } catch {
          btn.textContent = 'Update status';
          btn.disabled = false;
        }
      });
    });
    document.querySelectorAll('[data-wall-toggle]').forEach((toggle) => {
      toggle.addEventListener('click', async (e) => {
        e.stopPropagation();
        const noteId = toggle.dataset.wallToggle;
        const newValue = !toggle.classList.contains('on');
        toggle.classList.toggle('on', newValue);
        try {
          await apiFetch(`/api/my-notes/${noteId}/wall-visibility`, {
            method: 'POST',
            body: JSON.stringify({ showOnWall: newValue }),
          });
          await reloadMyNotes();
        } catch {
          toggle.classList.toggle('on', !newValue); // revert on failure
        }
      });
    });
    document.querySelectorAll('[data-delete]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const noteId = btn.dataset.delete;
        if (!confirm('Delete this note? This can\'t be undone.')) return;
        btn.disabled = true;
        try {
          await apiFetch(`/api/my-notes/${noteId}`, { method: 'DELETE' });
          await reloadMyNotes();
          if (currentNotesScope === 'all') showNotes(); else showTeamBoard();
        } catch {
          btn.disabled = false;
          alert("Couldn't delete this note — please try again.");
        }
      });
    });
  }

          cardsEl.querySelectorAll('.plan-card').forEach((c) => c.classList.remove('selected'));

        }
        selectedPlan = plan;

        actionEl.style.display = 'block';
      });
    });

    document.getElementById('skip-payment-btn').addEventListener('click', async () => {
      if (!selectedPlan) return;
      const btn = document.getElementById('skip-payment-btn');
      btn.disabled = true;
      btn.textContent = 'Applying…';

        showBilling();
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Skip payment — apply now (testing)';
      }
    });
  }

  // Prints the card by opening it, alone, in a fresh window — rather than
  // hiding the rest of the dashboard via @media print CSS. That approach
  // relies on position:fixed during printing, which behaves inconsistently
  // across browsers/OSes. A standalone document sidesteps that entirely.
  //
  // The card itself is a single flattened PNG (built by renderFullCardImage)
  // rather than live HTML with web fonts — Chrome's print preview can
  // rasterize before a web font finishes swapping in even after the page
  // reports "loaded," which produced an unstyled-looking preview that then
  // "fixed itself" once you cancelled and looked at the live page again.
  // A pre-rendered image has nothing left to load, so there's no race left.
  function openPrintWindow(idSuffix, biz) {
    const cardDataUrl = cardImageCache[idSuffix];
    if (!cardDataUrl) {
      alert("The card hasn't finished generating yet — give it a second and try again.");
      return;
    }

    const printWindow = window.open('', '_blank', 'width=500,height=700');
    if (!printWindow) {
      alert('Your browser blocked the print window pop-up. Please allow pop-ups for this site and try again.');
      return;
    }

    printWindow.document.write(`
      <!DOCTYPE html>
      <html>
      <head>
        <meta charset="UTF-8">
        <title>Print Card — ${escapeHtml(biz.businessName)}</title>
        <style>
          @page { size: auto; margin: 0.5in; }
          *{box-sizing:border-box; margin:0; padding:0;}
          body{display:flex; align-items:center; justify-content:center; min-height:100vh; background:#fff;}
          img{display:block; width:340px; height:auto;}
        </style>
      </head>
      <body>
        <img id="card-img" src="${cardDataUrl}" alt="Print card">
        <script>
          var img = document.getElementById('card-img');
          function triggerPrint() { window.focus(); window.print(); }
          if (img.complete) triggerPrint();
          else { img.onload = triggerPrint; img.onerror = triggerPrint; }
        <\/script>
      </body>
      </html>
    `);
    printWindow.document.close();
  }

  // Draws a simple filled rounded rect (roundRect isn't universally available
  // on older canvas implementations, but is used elsewhere in this file —
  // kept identical here for consistency).
  function roundRectPath(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
  }

  // Wraps text to a max width, returns the lines drawn and total height used.
  function wrapAndDrawText(ctx, text, cx, startY, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let y = startY;
    for (let i = 0; i < words.length; i++) {
      const testLine = line ? `${line} ${words[i]}` : words[i];
      if (ctx.measureText(testLine).width > maxWidth && line) {
        ctx.fillText(line, cx, y);
        line = words[i];
        y += lineHeight;
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line, cx, y);
    return y + lineHeight;
  }

  const LOGO_MARK_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><path d="M56 10 L146 10 L190 54 L190 144 A46 46 0 0 1 144 190 L56 190 A46 46 0 0 1 10 144 L10 56 A46 46 0 0 1 56 10 Z" fill="#FCF6EC" stroke="#FCF6EC" stroke-width="10"/><path d="M146 10 L190 54 L146 54 Z" fill="#FCF6EC" opacity=".65"/><circle cx="66" cy="86" r="9" fill="#B84B29"/><circle cx="130" cy="86" r="9" fill="#B84B29"/><path d="M56 120 Q100 158 142 120" stroke="#B84B29" stroke-width="16" stroke-linecap="round" fill="none"/></svg>`;

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  // Renders the ENTIRE printable card — background, wordmark, headline,
  // subtext, QR code, business name — onto a single canvas, then returns
  // it as one flattened PNG data URL. Explicitly waits for the exact fonts
  // used before drawing any text, since canvas text rendering has its own
  // font-loading race separate from normal DOM layout.
  async function renderFullCardImage(biz, boardUrl, idSuffix) {
    const isTeam = idSuffix === 'team';
    const headlineText = isTeam ? 'Got feedback for the team?' : 'Help us! Could we be doing something better?';
    const subtextText = isTeam
      ? "Leave an anonymous note, or back a colleague's — takes 20 seconds."
      : "Leave an anonymous note, or back someone else's — takes 20 seconds.";

    if (document.fonts && document.fonts.load) {
      await Promise.all([
        document.fonts.load('600 76px Fredoka'),
        document.fonts.load('600 32px Fredoka'),
        document.fonts.load('500 26px "Work Sans"'),
        document.fonts.load('400 22px "Space Mono"'),
      ]).catch(() => {}); // proceed with fallback fonts rather than fail the whole card
    }

    const logoMarkImg = await loadImage('data:image/svg+xml;base64,' + btoa(LOGO_MARK_SVG));
    const bizLogoImg = biz.logoDataUrl ? await loadImage(biz.logoDataUrl).catch(() => null) : null;

    const W = 680;
    const padX = 56;
    let y = 72;

    // Pre-measure QR so we can size the canvas correctly before drawing.
    const qr = qrcode(0, 'H');
    qr.addData(boardUrl);
    qr.make();
    const moduleCount = qr.getModuleCount();
    const qrSize = 440;
    const qrBoxPad = 32;
    const qrBoxSize = qrSize + qrBoxPad * 2;

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    // Estimate height with a first dry-run pass using a tall scratch canvas,
    // since word-wrapped line counts depend on measured text width.
    canvas.width = W;
    canvas.height = 2000;

    ctx.textAlign = 'center';

    // Logo lockup
    const markSize = 60;
    ctx.font = '600 32px Fredoka, sans-serif';
    const wordmarkWidth = ctx.measureText('SuggestionsBox').width;
    const lockupWidth = markSize + 14 + wordmarkWidth;
    const lockupStartX = W / 2 - lockupWidth / 2;
    ctx.drawImage(logoMarkImg, lockupStartX, y, markSize, markSize);
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FCF6EC';
    ctx.fillText('Suggestions', lockupStartX + markSize + 14, y + markSize / 2 + 11);
    const suggestionsWidth = ctx.measureText('Suggestions').width;
    ctx.fillStyle = 'rgba(251,241,226,.7)';
    ctx.fillText('Box', lockupStartX + markSize + 14 + suggestionsWidth, y + markSize / 2 + 11);
    ctx.textAlign = 'center';
    y += markSize + 40;

    // Headline
    ctx.font = '600 38px Fredoka, sans-serif';
    ctx.fillStyle = '#FCF6EC';
    y = wrapAndDrawText(ctx, headlineText, W / 2, y, W - padX * 2, 48) + 8;

    // Subtext
    ctx.font = '500 26px "Work Sans", sans-serif';
    ctx.fillStyle = 'rgba(251,241,226,.88)';
    y = wrapAndDrawText(ctx, subtextText, W / 2, y, W - padX * 2, 36) + 24;

    // QR box
    const qrBoxX = W / 2 - qrBoxSize / 2;
    ctx.fillStyle = '#FCF6EC';
    roundRectPath(ctx, qrBoxX, y, qrBoxSize, qrBoxSize, 28);
    ctx.fill();

    const qrX = qrBoxX + qrBoxPad;
    const qrY = y + qrBoxPad;
    const cell = qrSize / moduleCount;
    const isFinderPattern = (row, col) => {
      const inTopLeft = row < 7 && col < 7;
      const inTopRight = row < 7 && col >= moduleCount - 7;
      const inBottomLeft = row >= moduleCount - 7 && col < 7;
      return inTopLeft || inTopRight || inBottomLeft;
    };
    for (let row = 0; row < moduleCount; row++) {
      for (let col = 0; col < moduleCount; col++) {
        if (!qr.isDark(row, col)) continue;
        ctx.fillStyle = isFinderPattern(row, col) ? '#B84B29' : '#254240';
        const px = qrX + col * cell;
        const py = qrY + row * cell;
        const pad = cell * 0.08;
        roundRectPath(ctx, px + pad, py + pad, cell - pad * 2, cell - pad * 2, cell * 0.25);
        ctx.fill();
      }
    }
    if (bizLogoImg) {
      const logoSize = qrSize * 0.24;
      const patchSize = logoSize * 1.35;
      const cx = qrX + qrSize / 2;
      const cy = qrY + qrSize / 2;
      ctx.fillStyle = '#FCF6EC';
      roundRectPath(ctx, cx - patchSize / 2, cy - patchSize / 2, patchSize, patchSize, patchSize * 0.2);
      ctx.fill();
      ctx.save();
      roundRectPath(ctx, cx - logoSize / 2, cy - logoSize / 2, logoSize, logoSize, logoSize * 0.18);
      ctx.clip();
      ctx.drawImage(bizLogoImg, cx - logoSize / 2, cy - logoSize / 2, logoSize, logoSize);
      ctx.restore();
    }
    y += qrBoxSize + 40;

    // Business name
    ctx.font = '400 22px "Space Mono", monospace';
    ctx.fillStyle = 'rgba(251,241,226,.75)';
    ctx.fillText(biz.businessName.toUpperCase(), W / 2, y);
    y += 60;

    const H = y;

    // Now that we know the real height, redraw everything onto a
    // correctly-sized final canvas with the rounded card background.
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = W;
    finalCanvas.height = H;
    const fctx = finalCanvas.getContext('2d');
    fctx.fillStyle = isTeam ? '#254240' : '#E2653A';
    roundRectPath(fctx, 0, 0, W, H, 40);
    fctx.fill();
    fctx.drawImage(canvas, 0, 0, W, H, 0, 0, W, H);

    return finalCanvas.toDataURL('image/png');
  }

  // Renders a small QR preview inside the dashboard panel itself (not used
  // for printing — that's handled by renderFullCardImage above).
  function renderQrCodeCanvas(containerId, url, logoDataUrl) {
    const container = document.getElementById(containerId);
    if (typeof qrcode === 'undefined') {
      container.innerHTML = `<div style="width:220px;height:220px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink-soft);text-align:center;padding:10px;">QR code library failed to load.</div>`;
      return;
    }

    const qr = qrcode(0, 'H');
    qr.addData(url);
    qr.make();

    const moduleCount = qr.getModuleCount();
    const size = 480;
    const cell = size / moduleCount;

    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    canvas.style.width = '220px';
    canvas.style.height = '220px';
    container.innerHTML = '';
    container.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#FCF6EC';
    ctx.fillRect(0, 0, size, size);

    const isFinderPattern = (row, col) => {
      const inTopLeft = row < 7 && col < 7;
      const inTopRight = row < 7 && col >= moduleCount - 7;
      const inBottomLeft = row >= moduleCount - 7 && col < 7;
      return inTopLeft || inTopRight || inBottomLeft;
    };

    for (let row = 0; row < moduleCount; row++) {
      for (let col = 0; col < moduleCount; col++) {
        if (!qr.isDark(row, col)) continue;
        ctx.fillStyle = isFinderPattern(row, col) ? '#B84B29' : '#254240';
        const x = col * cell;
        const y = row * cell;
        const pad = cell * 0.08;
        ctx.beginPath();
        ctx.roundRect(x + pad, y + pad, cell - pad * 2, cell - pad * 2, cell * 0.25);
        ctx.fill();
      }
    }

    if (logoDataUrl) {
      const img = new Image();
      img.onload = () => {
        const logoSize = size * 0.24;
        const patchSize = logoSize * 1.35;
        const cx = size / 2;
        const cy = size / 2;
        ctx.fillStyle = '#FCF6EC';
        ctx.beginPath();
        ctx.roundRect(cx - patchSize / 2, cy - patchSize / 2, patchSize, patchSize, patchSize * 0.2);
        ctx.fill();
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(cx - logoSize / 2, cy - logoSize / 2, logoSize, logoSize, logoSize * 0.18);
        ctx.clip();
        ctx.drawImage(img, cx - logoSize / 2, cy - logoSize / 2, logoSize, logoSize);
        ctx.restore();
      };
      img.src = logoDataUrl;
    }
  }

  async function loadTeamMembers() {
    const listEl = document.getElementById('team-members-list');
    if (!listEl) return;
    try {
      const members = await apiFetch('/api/team-members');
      listEl.innerHTML = members.length === 0
        ? `<div class="member-row" style="border-bottom:none; padding-top:0;"><div class="member-info"><div class="member-email" style="margin-top:0;">No team members yet — invite one below.</div></div></div>`
        : members.map((m) => `
            <div class="member-row" data-member-id="${m.id}">
              <div class="member-info">
                <div class="member-name">${escapeHtml(m.name || m.email)} ${m.status === 'pending' ? '<span class="pending-tag">Invited</span>' : ''}</div>
                <div class="member-email">${escapeHtml(m.email)}</div>
              </div>
              <span class="member-role-badge ${m.role}">${ROLE_LABELS[m.role] || m.role}</span>
              <div class="member-actions">
                ${m.status === 'pending'
                  ? `<button class="member-action-btn" data-resend-invite="${m.id}">Resend invite</button>`
                  : `<button class="member-action-btn" data-reset-pw="${m.id}">Reset password</button>`}
                <button class="member-action-btn danger" data-remove-member="${m.id}">Remove</button>
              </div>
            </div>
          `).join('');

      listEl.querySelectorAll('[data-remove-member]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const row = btn.closest('.member-row');
          const name = row.querySelector('.member-name').textContent;
          if (!confirm(`Remove ${name}? They'll be logged out immediately and won't be able to log back in.`)) return;
          btn.disabled = true;
          try {
            await apiFetch(`/api/team-members/${btn.dataset.removeMember}`, { method: 'DELETE' });
            loadTeamMembers();
          } catch (err) {
            alert(err.message);
            btn.disabled = false;
          }
        });
      });

      listEl.querySelectorAll('[data-reset-pw]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const newPassword = prompt('Enter a new password for this person (at least 8 characters):');
          if (!newPassword) return;
          if (newPassword.length < 8) { alert('Password must be at least 8 characters.'); return; }
          try {
            await apiFetch(`/api/team-members/${btn.dataset.resetPw}/password`, {
              method: 'POST',
              body: JSON.stringify({ newPassword }),
            });
            alert('Password updated — let them know their new password.');
          } catch (err) {
            alert(err.message);
          }
        });
      });

      listEl.querySelectorAll('[data-resend-invite]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Sending…';
          try {
            const result = await apiFetch(`/api/team-members/${btn.dataset.resendInvite}/resend-invite`, { method: 'POST' });
            alert(result.emailSent ? 'Invite re-sent.' : "Invite refreshed, but the email couldn't be sent — check your email setup.");
          } catch (err) {
            alert(err.message);
          }
          btn.disabled = false;
          btn.textContent = 'Resend invite';
        });
      });
    } catch (err) {
      listEl.innerHTML = `<div class="form-msg error" style="display:block;">Couldn't load team members.</div>`;
    }
  }

  function wireSettingsForm() {
    document.getElementById('add-member-btn').addEventListener('click', async () => {
      const btn = document.getElementById('add-member-btn');
      const name = document.getElementById('new-member-name').value;
      const email = document.getElementById('new-member-email').value;
      const role = document.getElementById('new-member-role').value;

      if (!email.trim()) {
        showFormMsg('team-add-msg', 'Email is required.', 'error');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const result = await apiFetch('/api/team-members', {
          method: 'POST',
          body: JSON.stringify({ name, email, role }),
        });
        document.getElementById('new-member-name').value = '';
        document.getElementById('new-member-email').value = '';
        showFormMsg('team-add-msg', result.emailSent ? 'Invite sent.' : "Invite created, but the email couldn't be sent — check your email setup, then use Resend invite.", result.emailSent ? 'success' : 'error');
        loadTeamMembers();
      } catch (err) {
        showFormMsg('team-add-msg', err.message, 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Send invite';
    });
    let pendingLogoDataUrl; // undefined = no change, null = remove, string = new upload
    const logoInput = document.getElementById('logo-input');
    const logoPreview = document.getElementById('logo-preview');

    const wallLinkOpen = document.getElementById('wall-link-open');
    if (wallLinkOpen) wallLinkOpen.addEventListener('click', () => markOnboardingStep('wallViewed'));

    const copyEmbedBtn = document.getElementById('copy-embed-btn');
    if (copyEmbedBtn) {
      copyEmbedBtn.addEventListener('click', async () => {
        const text = document.getElementById('embed-code-text').textContent;
        try {
          await navigator.clipboard.writeText(text);
          copyEmbedBtn.textContent = 'Copied!';
        } catch {
          copyEmbedBtn.textContent = "Couldn't copy — select and copy manually";
        }
        setTimeout(() => { copyEmbedBtn.textContent = 'Copy code'; }, 2000);
      });
    }

    document.getElementById('logo-upload-btn').addEventListener('click', () => logoInput.click());

    logoInput.addEventListener('change', () => {
      const file = logoInput.files[0];
      if (!file) return;
      if (file.size > 1000000) {
        showFormMsg('profile-msg', 'Image is too large — please use one under 1MB.', 'error');
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        pendingLogoDataUrl = reader.result;
        logoPreview.innerHTML = `<img src="${reader.result}" alt="Logo preview">`;
      };
      reader.readAsDataURL(file);
    });

    const removeBtn = document.getElementById('logo-remove-btn');
    if (removeBtn) {
      removeBtn.addEventListener('click', () => {
        pendingLogoDataUrl = null;
        logoPreview.innerHTML = `<span class="placeholder">${escapeHtml((ME.businessName || '?').charAt(0).toUpperCase())}</span>`;
      });
    }

    document.getElementById('save-profile-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-profile-btn');
      const body = {
        businessName: document.getElementById('set-business-name').value,
        ownerName: document.getElementById('set-owner-name').value,
        email: document.getElementById('set-email').value,
        address: document.getElementById('set-address').value,
      };
      if (pendingLogoDataUrl === null) body.removeLogo = true;
      else if (typeof pendingLogoDataUrl === 'string') body.logoDataUrl = pendingLogoDataUrl;

      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        await apiFetch('/api/business/profile', { method: 'POST', body: JSON.stringify(body) });
        ME = await apiFetch('/api/me');
        renderTopRightAvatar();
        showSettings();
        showFormMsg('profile-msg', 'Saved.', 'success');
      } catch (err) {
        showFormMsg('profile-msg', err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Save changes';
      }
    });

    document.getElementById('save-password-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-password-btn');
      const currentPassword = document.getElementById('set-current-password').value;
      const newPassword = document.getElementById('set-new-password').value;
      if (!currentPassword || !newPassword) {
        showFormMsg('password-msg', 'Both fields are required.', 'error');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Updating…';
      try {
        await apiFetch('/api/business/password', {
          method: 'POST',
          body: JSON.stringify({ currentPassword, newPassword }),
        });
        showFormMsg('password-msg', 'Password updated.', 'success');
        document.getElementById('set-current-password').value = '';
        document.getElementById('set-new-password').value = '';
      } catch (err) {
        showFormMsg('password-msg', err.message, 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Update password';
    });

    // Email notification preferences
    let pendingDigestEnabled = ME.digestEnabled;
    let pendingDigestSkipEmpty = ME.digestSkipEmpty;

    const digestEnabledToggle = document.getElementById('digest-enabled-toggle');
    digestEnabledToggle.addEventListener('click', () => {
      pendingDigestEnabled = !pendingDigestEnabled;
      digestEnabledToggle.classList.toggle('on', pendingDigestEnabled);
      document.getElementById('digest-sub-options').style.display = pendingDigestEnabled ? 'block' : 'none';
    });

    const digestSkipEmptyToggle = document.getElementById('digest-skip-empty-toggle');
    digestSkipEmptyToggle.addEventListener('click', () => {
      pendingDigestSkipEmpty = !pendingDigestSkipEmpty;
      digestSkipEmptyToggle.classList.toggle('on', pendingDigestSkipEmpty);
    });

    document.getElementById('save-email-prefs-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-email-prefs-btn');
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        await apiFetch('/api/business/email-preferences', {
          method: 'POST',
          body: JSON.stringify({
            digestEnabled: pendingDigestEnabled,
            digestEmail: document.getElementById('set-digest-email').value,
            digestSkipEmpty: pendingDigestSkipEmpty,
          }),
        });
        ME = await apiFetch('/api/me');
        showFormMsg('email-prefs-msg', 'Saved.', 'success');
      } catch (err) {
        showFormMsg('email-prefs-msg', err.message, 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Save preferences';
    });
  }

  function showFormMsg(id, text, kind) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `form-msg ${kind}`;
    el.style.display = 'block';
  }

  boot();
</script>

</body>
</html>
