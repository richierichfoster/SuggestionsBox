<style>
  :root{
    color-scheme: light;
    --cream:#FBF1E2; --card:#FFFCF6; --terra:#E2653A; --terra-deep:#B84B29;
    --gold:#D9A441; --teal-deep:#254240; --teal-tint:#E3EDEB;
    --ink:#2E2B28; --ink-soft:#6E6A63; --line:#EDE0CC; --good:#EFF4DE; --good-ink:#5E7A1F;
    --alert:#C4432A; --alert-tint:#FBE3DD;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{background:#FBF1E2 !important;}
  body{font-family:'Work Sans',sans-serif; color:#2E2B28 !important; background:#FBF1E2 !important; -webkit-font-smoothing:antialiased;}
  #root{max-width:480px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:70px;}
  h1,h2,h3{font-family:'Fredoka',sans-serif; font-weight:600; margin:0;}
  a{color:inherit;}

  .topbar{
    display:flex; align-items:center; justify-content:space-between; padding:18px 18px 14px;
    position:sticky; top:0; background:rgba(251,241,226,0.94); backdrop-filter:blur(6px); z-index:10; border-bottom:1px solid var(--line);
  }
  .topbar h1{font-size:17px;}
  .topbar-brand{display:flex; align-items:center; gap:9px;}
  .topbar-brand svg{width:26px; height:26px; flex-shrink:0;}
  .topbar-logo{width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:var(--card); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0;}
  .topbar-logo img{width:100%; height:100%; object-fit:cover;}
  .icon-btn{width:34px; height:34px; border-radius:10px; background:var(--card); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .icon-btn svg{width:16px; height:16px;}
  .page{padding:16px 18px;}

  .note-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px 16px 16px;
    margin-bottom:12px; display:flex; gap:13px; align-items:flex-start;
    transition:transform .15s ease, box-shadow .15s ease;
    position:relative; overflow:hidden;
  }
  .note-card::before{
    content:""; position:absolute; top:0; left:0; right:0; height:10px;
    background-image: radial-gradient(circle at 6px 6px, var(--cream) 3px, transparent 3.5px);
    background-size: 12px 10px; background-repeat:repeat-x; background-position:top center;
  }
  .note-card:hover{transform:translateY(-1px); box-shadow:0 8px 18px rgba(46,38,32,.07);}
  .vote-btn{
    flex:none; width:46px; height:52px; border-radius:12px; background:var(--cream); border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;
    font-family:'Space Mono',monospace; font-weight:700; gap:2px; padding:0;
  }
  .vote-btn svg{width:16px; height:16px; fill:none; stroke:var(--gold); stroke-width:1.6;}
  .vote-btn.voted{background:var(--terra); border-color:var(--terra); color:var(--card);}
  .vote-btn.voted svg{fill:var(--card); stroke:var(--card);}
  .vote-btn .vlabel{font-size:14px;}
  .note-body{flex:1; min-width:0;}
  .note-body .ntext{font-size:14px; line-height:1.5; margin-bottom:8px; color:var(--ink);}
  .note-meta{display:flex; align-items:center; gap:7px; font-family:'Space Mono',monospace; font-size:10px; color:var(--ink-soft); flex-wrap:wrap; margin-bottom:2px;}

  .response-box{
    background:var(--cream); border-radius:9px; padding:11px 13px; margin-top:10px;
    border-left:3px solid var(--gold);
  }
  .response-box p{margin:0; font-size:12.5px; line-height:1.5; color:var(--ink);}

  .status-pill{display:inline-block; padding:3px 9px; border-radius:6px; font-size:9px; text-align:center; white-space:nowrap; margin-bottom:7px;}
  .status-pill.sent{background:#EFEAE3; color:var(--ink-soft);}
  .status-pill.seen{background:#E4EEFB; color:#3A5F8A;}
  .status-pill.acknowledged{background:#FBEBD9; color:var(--terra-deep);}
  .status-pill.in_progress{background:#FBF1D0; color:#9A7A15;}
  .status-pill.actioned{background:var(--good); color:var(--good-ink);}
  .status-pill.not_planned{background:#EFEAE3; color:var(--ink-soft);}

  .fab{position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%; background:var(--terra); color:var(--card); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 22px rgba(226,101,58,0.35); border:none; cursor:pointer; font-size:26px; max-width:480px;}

  .btn-primary{background:var(--terra); color:var(--card); border:none; font-family:'Fredoka',sans-serif; font-weight:600; font-size:14px; padding:13px; border-radius:12px; width:100%; cursor:pointer;}
  .btn-primary:disabled{opacity:.5; cursor:not-allowed;}
  .btn-secondary{background:transparent; border:1px solid var(--line); color:var(--ink); font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px; padding:11px; border-radius:11px; width:100%; cursor:pointer;}

  .field{margin-bottom:14px;}
  .field label{font-family:'Space Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--ink-soft); display:block; margin-bottom:6px;}
  .field input, .field textarea{width:100%; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:11px; font-size:16px; font-family:'Work Sans',sans-serif; color:var(--ink);}
  .field textarea{min-height:100px; resize:vertical;}

  .chip-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .chip{font-size:12px; padding:8px 14px; border-radius:16px; border:1px solid var(--line); background:var(--card); cursor:pointer; font-weight:500;}
  .chip.active{background:var(--terra); border-color:var(--terra); color:var(--card);}
  .checkbox-row{display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:13px;}

  .nudge{display:flex; gap:8px; align-items:flex-start; background:var(--alert-tint); color:var(--alert); border-radius:10px; padding:10px; font-size:12px; line-height:1.4; margin-bottom:14px;}
  .nudge button{background:var(--card); border:1px solid var(--line); border-radius:8px; padding:6px 10px; font-size:11.5px; font-family:'Fredoka',sans-serif; font-weight:600; cursor:pointer; margin-top:6px; margin-right:6px;}

  .staff-banner{
    display:flex; align-items:center; gap:8px; background:#E3EDEB; color:#254240;
    border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.4; margin:0 18px 4px;
  }
  .staff-banner svg{width:15px; height:15px; flex:none;}

  .tone-badge{
    display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--ink-soft);
    margin-bottom:14px; line-height:1.4;
  }
  .tone-badge svg{width:14px; height:14px; flex:none; color:var(--gold,#D9A441);}
  .tone-status{font-size:11.5px; margin:-8px 0 14px; display:flex; align-items:center; gap:6px;}
  .tone-status.checking{color:var(--ink-soft);}
  .tone-status.passed{color:var(--good-ink);}
  .tone-spinner{width:11px; height:11px; border:2px solid var(--line); border-top-color:var(--ink-soft); border-radius:50%; animation:tone-spin .7s linear infinite; flex:none;}
  @keyframes tone-spin{to{transform:rotate(360deg);}}

  .thankyou-overlay{
    position:fixed; inset:0; background:rgba(46,38,32,.45); z-index:50;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .thankyou-modal{
    background:var(--cream); border-radius:18px; padding:32px 26px; max-width:340px; width:100%;
    text-align:center; box-shadow:0 20px 50px rgba(46,38,32,.25); position:relative;
  }
  .thankyou-close{
    position:absolute; top:12px; right:12px; width:28px; height:28px; border-radius:8px;
    background:var(--card); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .thankyou-close svg{width:13px; height:13px;}
  .thankyou-icon{width:52px; height:52px; margin:0 auto 16px; background:var(--good); border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .thankyou-icon svg{width:24px; height:24px; color:var(--good-ink);}
  .thankyou-modal h2{font-size:18px; margin-bottom:8px;}
  .thankyou-modal p{font-size:13px; color:var(--ink-soft); line-height:1.6; margin-bottom:18px;}
  .app-soon-box{
    background:var(--card); border:1px dashed var(--line); border-radius:12px; padding:14px;
    text-align:left; display:flex; gap:10px; align-items:flex-start; margin-bottom:18px;
  }
  .app-soon-box svg{width:17px; height:17px; flex:none; color:var(--terra-deep); margin-top:1px;}
  .app-soon-box .ast{font-family:'Fredoka',sans-serif; font-weight:600; font-size:12.5px; margin-bottom:3px;}
  .app-soon-box .asd{font-size:11.5px; color:var(--ink-soft); line-height:1.5;}

  .store-badge-row{display:flex; gap:10px; margin-top:18px; justify-content:center;}
  .store-badge{
    display:flex; align-items:center; gap:8px; background:#000; color:#fff;
    border:1px solid #555; border-radius:9px; padding:7px 13px 7px 11px; opacity:.6; cursor:default; user-select:none;
  }
  .store-badge svg{width:22px; height:22px; flex:none;}
  .store-badge .sb-text{line-height:1.1; text-align:left;}
  .store-badge .sb-small{font-size:8.5px; display:block; font-family:'Work Sans',sans-serif;}
  .store-badge .sb-big{font-size:14px; font-weight:600; display:block; font-family:'Work Sans',sans-serif; letter-spacing:.01em;}

  .timeline{position:relative; padding-left:22px; margin-top:16px;}
  .timeline::before{content:""; position:absolute; left:5px; top:4px; bottom:4px; width:2px; background:var(--line);}
  .tstep{position:relative; padding-bottom:18px;}
  .tstep:last-child{padding-bottom:0;}
  .tstep::before{content:""; position:absolute; left:-22px; top:2px; width:11px; height:11px; border-radius:50%; background:var(--good-ink); border:2px solid var(--cream);}
  .tstep .tlabel{font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px; text-transform:capitalize;}
  .tstep .ttime{font-family:'Space Mono',monospace; font-size:10px; color:var(--ink-soft); margin-top:1px;}
  .tstep .tmsg{font-size:12px; color:var(--ink-soft); margin-top:4px; line-height:1.5;}

  .empty{text-align:center; padding:60px 20px; color:var(--ink-soft); font-size:13.5px; line-height:1.6;}
  .back-link{font-size:13px; color:var(--ink-soft); display:inline-flex; align-items:center; gap:6px; cursor:pointer; margin-bottom:12px;}
  .footer-brand{text-align:center; padding:18px; font-family:'Space Mono',monospace; font-size:10.5px; color:var(--ink-soft);}
  .footer-brand a{color:var(--terra-deep); font-weight:700;}
</style>
</head>
<body>
<div id="root"><div class="empty">Loading…</div></div>

<script>
  const API_BASE = 'https://api.suggestionsbox.com.au';
  const root = document.getElementById('root');
  const params = new URLSearchParams(window.location.search);
  const businessId = params.get('business');
  const wantsStaffView = params.get('staff') === '1';

  function getDeviceId() {
    let id = localStorage.getItem('sb_board_device_id');
    if (!id) {
      id = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('sb_board_device_id', id);
    }
    return id;
  }

  let businessName = '';
  let businessLogoUrl = null;
  let isStaffMode = false;
  let view = { name: 'home' };

  async function api(path, options = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
      ...options,
      headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      const err = new Error(data.error || 'Request failed');
      err.status = res.status;
      err.data = data;
      throw err;
    }
    return data;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function timeAgo(iso) {
    if (!iso) return '';
    const mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    if (days < 7) return `${days}d ago`;
    const weeks = Math.floor(days / 7);
    if (weeks < 5) return `${weeks}w ago`;
    const months = Math.floor(days / 30);
    return `${months}mo ago`;
  }

  const STATUS_LABELS = { sent:'Sent', seen:'Seen', acknowledged:'Acknowledged', in_progress:'In progress', actioned:'Actioned', not_planned:'Not planned' };

  async function boot() {
    if (!businessId) {
      root.innerHTML = `<div class="empty">No business specified.<br>This link should include <code>?business=&lt;id&gt;</code>.</div>`;
      return;
    }
    try {
      const biz = await api(`/api/board/${businessId}`);
      businessName = biz.name;
      businessLogoUrl = biz.logoDataUrl || null;
      // Staff mode only activates if the link asked for it AND the
      // business's plan actually includes employee notes — a shared
      // staff link on a Starter business just falls back to customer view.
      isStaffMode = wantsStaffView && !!biz.employeeNotesEnabled;
      renderHome();
    } catch (err) {
      root.innerHTML = `<div class="empty">Couldn't find that business board.<br>Double check the link.</div>`;
    }
  }

  async function renderHome() {
    const staffBanner = isStaffMode ? `
      <div class="staff-banner">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#254240" stroke-width="1.6"/></svg>
        <span>You're viewing as a team member — notes here are private to ${escapeHtml(businessName)}'s staff, separate from the public customer board.</span>
      </div>
    ` : '';
    root.innerHTML = `
      <div class="topbar">
        <div class="topbar-brand">
          <svg viewBox="0 0 200 200"><path d="M56 10 L146 10 L190 54 L190 144 A46 46 0 0 1 144 190 L56 190 A46 46 0 0 1 10 144 L10 56 A46 46 0 0 1 56 10 Z" fill="#FBF1E2" stroke="#E2653A" stroke-width="10"/><path d="M146 10 L190 54 L146 54 Z" fill="#E2653A"/><path d="M146 10 L146 54 L190 54" fill="none" stroke="#B84B29" stroke-width="4" stroke-linejoin="round"/><circle cx="66" cy="86" r="9" fill="#E2653A"/><circle cx="130" cy="86" r="9" fill="#E2653A"/><path d="M56 120 Q100 158 142 120" stroke="#E2653A" stroke-width="16" stroke-linecap="round" fill="none"/></svg>
          <h1>${escapeHtml(businessName)}${isStaffMode ? ' · Team' : ''}</h1>
        </div>
        ${businessLogoUrl ? `<div class="topbar-logo"><img src="${businessLogoUrl}" alt=""></div>` : `<div style="width:34px;"></div>`}
      </div>
      ${staffBanner}
      <div class="page" id="notes-page"><div class="empty">Loading notes…</div></div>
      <button class="fab" id="fab">+</button>
      <div class="footer-brand">Powered by <a href="https://www.suggestionsbox.com.au/">Suggestions Box</a></div>
    `;
    document.getElementById('fab').addEventListener('click', renderCompose);
    await loadNotes();
  }

  async function loadNotes() {
    const page = document.getElementById('notes-page');
    try {
      const lane = isStaffMode ? 'employee' : 'customer';
      const notes = await api(`/api/board/${businessId}/notes?deviceId=${getDeviceId()}&lane=${lane}`);
      if (notes.length === 0) {
        page.innerHTML = isStaffMode
          ? `<div class="empty">No team notes yet.<br>Be the first to say something — tap the + button below.</div>`
          : `<div class="empty">No notes yet.<br>Be the first to say something — tap the + button below.</div>`;
        return;
      }
      page.innerHTML = notes.map((n) => `
        <div class="note-card" data-id="${n.id}">
          <button class="vote-btn ${n.hasVoted ? 'voted' : ''}" data-vote="${n.id}">
            <svg viewBox="0 0 20 20"><path d="M10 17s-6.5-4.1-8.5-8.2C.3 6.1 1.7 3 4.7 3c1.7 0 3 .9 3.7 2.1C9.1 3.9 10.4 3 12.1 3c3 0 4.4 3.1 3.2 5.8C14.5 12.9 10 17 10 17z"/></svg>
            <span class="vlabel">${n.voteCount}</span>
          </button>
          <div class="note-body" data-open="${n.id}">
            <span class="status-pill ${n.status}">${STATUS_LABELS[n.status]}</span>
            <div class="ntext">"${escapeHtml(n.text)}"</div>
            <div class="note-meta">
              <span>${escapeHtml(n.displayName)}</span>
              <span>·</span><span>${timeAgo(n.createdAt)}</span>
            </div>
            ${n.response ? `
              <div class="response-box">
                <p>${escapeHtml(n.response)}</p>
              </div>
            ` : ''}
          </div>
        </div>
      `).join('');

      page.querySelectorAll('[data-vote]').forEach((btn) => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = btn.dataset.vote;
          try {
            await api(`/api/board/${businessId}/notes/${id}/vote`, { method: 'POST', body: JSON.stringify({ deviceId: getDeviceId() }) });
            loadNotes();
          } catch {}
        });
      });
      page.querySelectorAll('[data-open]').forEach((el) => {
        el.addEventListener('click', () => renderDetail(el.dataset.open));
      });
    } catch (err) {
      page.innerHTML = `<div class="empty">Couldn't load notes.</div>`;
    }
  }

  function showThankYouModal() {
    const overlay = document.createElement('div');
    overlay.className = 'thankyou-overlay';
    overlay.innerHTML = `
      <div class="thankyou-modal">
        <button class="thankyou-close" id="thankyou-close" aria-label="Dismiss">
          <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#2E2B28" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="thankyou-icon">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.8"/></svg>
        </div>
        <h2>Thank you!</h2>
        <p>That helps make this business better. Your note is on its way to the owner now.</p>
        <div class="app-soon-box">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="1.6"/></svg>
          <div>
            <div class="ast">Track your note's progress</div>
            <div class="asd">An app to follow along as your note gets picked up is coming soon.</div>
          </div>
        </div>
        <div class="store-badge-row">
          <div class="store-badge" title="Coming soon">
            <svg viewBox="0 0 24 24" fill="#fff"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4.08zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
            <div class="sb-text"><span class="sb-small">Download on the</span><span class="sb-big">App Store</span></div>
          </div>
          <div class="store-badge" title="Coming soon">
            <svg viewBox="0 0 512 512"><path fill="#00d2ff" d="M99 20c-6 4-10 11-10 20v432c0 9 4 16 10 20l236-236z"/><path fill="#ffe000" d="M99 20c3-2 6-3 10-3 4 0 8 1 12 3l217 124-91 91z"/><path fill="#ff3a44" d="M247 256l91 91-217 124c-4 2-8 3-12 3-4 0-7-1-10-3z"/><path fill="#00ee76" d="M338 165l89 51c14 8 14 26 0 34l-89 51-91-91z"/></svg>
            <div class="sb-text"><span class="sb-small">GET IT ON</span><span class="sb-big">Google Play</span></div>

      </div>
    `;
    document.body.appendChild(overlay);
    const dismiss = () => overlay.remove();
    document.getElementById('thankyou-close').addEventListener('click', dismiss);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) dismiss(); });
  }

  function renderCompose() {
    root.innerHTML = `
      <div class="topbar">
        <div class="icon-btn" id="back"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#2E2B28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <h1>New note</h1><div style="width:34px;"></div>
      </div>
      ${isStaffMode ? `<div class="staff-banner" style="margin:14px 18px 0;">This note will go to your team's private feed.</div>` : ''}
      <div class="page">
        <div class="field"><label>What's this about</label>
          <div class="chip-row" id="cat-row">
            ${['General','Service','Pricing','Scheduling','Quality'].map((c,i) => `<div class="chip ${i===0?'active':''}" data-cat="${c.toLowerCase()}">${c}</div>`).join('')}
          </div>
        </div>
        <div class="field"><label>Your note</label><textarea id="note-text" placeholder="What's working, or what isn't?"></textarea></div>
        <div class="tone-badge">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="1.6"/></svg>
          Every note is quickly reviewed for tone before it posts.
        </div>
        <div id="tone-status" class="tone-status" style="display:none;"></div>
        <div id="mod-check"></div>
        <div class="checkbox-row"><input type="checkbox" id="anon" checked><label for="anon" style="margin:0; text-transform:none; font-family:'Work Sans';">Post anonymously</label></div>
        <div class="field" id="name-field" style="display:none;"><label>Your name (optional)</label><input id="author-name" placeholder="e.g. Priya"></div>
        <div id="submit-error" style="color:var(--alert); font-size:12px; margin-bottom:10px;"></div>
        <button class="btn-primary" id="submit-note" disabled>Tear off & send</button>
      </div>
    `;
    document.getElementById('back').addEventListener('click', renderHome);

    let category = 'general';
    document.querySelectorAll('[data-cat]').forEach((chip) => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('[data-cat]').forEach((c) => c.classList.remove('active'));
        chip.classList.add('active');
        category = chip.dataset.cat;
      });
    });

    const textarea = document.getElementById('note-text');
    const submitBtn = document.getElementById('submit-note');
    const modBox = document.getElementById('mod-check');
    const toneStatusEl = document.getElementById('tone-status');
    let moderationStatus = 'unchecked'; // unchecked | checking | passed | blocked | nudged
    let debounceTimer;

    function updateSubmitState() {
      const hasText = !!textarea.value.trim();
      const canSubmit = moderationStatus === 'passed' || moderationStatus === 'nudged';
      submitBtn.disabled = !hasText || !canSubmit;

      if (!hasText) {
        toneStatusEl.style.display = 'none';
      } else if (moderationStatus === 'checking') {
        toneStatusEl.style.display = 'flex';
        toneStatusEl.className = 'tone-status checking';
        toneStatusEl.innerHTML = `<span class="tone-spinner"></span>Checking tone…`;
      } else if (moderationStatus === 'passed') {
        toneStatusEl.style.display = 'flex';
        toneStatusEl.className = 'tone-status passed';
        toneStatusEl.innerHTML = `✓ Looks good`;
      } else {
        toneStatusEl.style.display = 'none';
      }
    }

    function runToneCheck() {
      clearTimeout(debounceTimer);
      moderationStatus = 'unchecked';
      modBox.innerHTML = '';
      updateSubmitState();
      if (!textarea.value.trim()) return;
      moderationStatus = 'checking';
      updateSubmitState();
      debounceTimer = setTimeout(async () => {
        try {
          const result = await api('/api/moderate', { method: 'POST', body: JSON.stringify({ text: textarea.value }) });
          if (result.ok) {
            moderationStatus = 'passed';
          } else if (result.severity === 'nudge') {
            moderationStatus = 'nudged';
            modBox.innerHTML = `
              <div class="nudge"><div>${escapeHtml(result.message)}
                ${result.suggestion ? `<div style="margin-top:6px; font-style:italic;">"${escapeHtml(result.suggestion)}"</div>` : ''}
                <div style="margin-top:8px;">
                  ${result.suggestion ? '<button id="use-rewrite">Use this instead</button>' : ''}
                  <button id="send-as-is">Send as I wrote it</button>
                </div>
              </div></div>`;
            if (result.suggestion) {
              document.getElementById('use-rewrite').addEventListener('click', () => {
                textarea.value = result.suggestion;
                runToneCheck();
              });
            }
            document.getElementById('send-as-is').addEventListener('click', () => {
              modBox.innerHTML = '';
              updateSubmitState();
            });
          } else {
            moderationStatus = 'blocked';
            modBox.innerHTML = `
              <div class="nudge"><div>${escapeHtml(result.message)}
                <div style="margin-top:8px;">
                  ${result.suggestion ? '<button id="use-rewrite">Use rewrite</button>' : ''}
                  <button id="edit-myself">I'll edit it myself</button>
                </div>
              </div></div>`;
            if (result.suggestion) {
              document.getElementById('use-rewrite').addEventListener('click', () => {
                textarea.value = result.suggestion;
                runToneCheck();
              });
            }
            document.getElementById('edit-myself').addEventListener('click', () => { modBox.innerHTML = ''; });
          }
        } catch {
          // Can't reach the moderation endpoint at all — fail open rather than
          // permanently block posting; the server re-checks tone on submit
          // regardless, so this is just the live client-side preview failing.
          moderationStatus = 'passed';
        }
        updateSubmitState();
      }, 500);
    }

    textarea.addEventListener('input', runToneCheck);

    document.getElementById('anon').addEventListener('change', (e) => {
      document.getElementById('name-field').style.display = e.target.checked ? 'none' : 'block';
    });

    submitBtn.addEventListener('click', async () => {
      const text = textarea.value.trim();
      if (!text || (moderationStatus !== 'passed' && moderationStatus !== 'nudged')) return;
      const isAnonymous = document.getElementById('anon').checked;
      const authorName = document.getElementById('author-name').value;
      const errBox = document.getElementById('submit-error');
      errBox.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      try {
        await api(`/api/board/${businessId}/notes`, {
          method: 'POST',
          body: JSON.stringify({ text, category, isAnonymous, authorName, deviceId: getDeviceId(), isEmployee: isStaffMode }),
        });
      } catch (err) {
        // A real submission failure — the note was NOT saved, so let them retry.
        if (err.status === 422 && err.data?.moderation) {
          moderationStatus = 'blocked';
          modBox.innerHTML = `<div class="nudge">${escapeHtml(err.data.moderation.message)}</div>`;
        } else if (err.status === 403) {
          errBox.textContent = "This business's plan doesn't include team notes right now.";
        } else {
          errBox.textContent = err.message;
        }
        submitBtn.disabled = false;
        submitBtn.textContent = 'Tear off & send';
        updateSubmitState();
        return;
      }

      // The note was saved successfully at this point. Anything past here is
      // just updating the UI — if it hiccups, the person shouldn't see a
      // "failed to send" message for a note that actually went through.
      try { await renderHome(); } catch {}
      try { showThankYouModal(); } catch {}
    });
  }

  async function renderDetail(noteId) {
    root.innerHTML = `
      <div class="topbar">
        <div class="icon-btn" id="back"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#2E2B28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <h1>Note</h1><div style="width:34px;"></div>
      </div>
      <div class="page" id="detail-page"><div class="empty">Loading…</div></div>
    `;
    document.getElementById('back').addEventListener('click', renderHome);

    try {
      const note = await api(`/api/board/${businessId}/notes/${noteId}?deviceId=${getDeviceId()}`);
      document.getElementById('detail-page').innerHTML = `
        <div class="note-card" style="margin-bottom:18px;">
          <button class="vote-btn ${note.hasVoted ? 'voted' : ''}" id="vote-btn">
            <svg viewBox="0 0 20 20"><path d="M10 17s-6.5-4.1-8.5-8.2C.3 6.1 1.7 3 4.7 3c1.7 0 3 .9 3.7 2.1C9.1 3.9 10.4 3 12.1 3c3 0 4.4 3.1 3.2 5.8C14.5 12.9 10 17 10 17z"/></svg>
            <span class="vlabel">${note.voteCount}</span>
          </button>
          <div class="note-body">
            <span class="status-pill ${note.status}">${STATUS_LABELS[note.status]}</span>
            <div class="ntext">"${escapeHtml(note.text)}"</div>
            <div class="note-meta"><span>${escapeHtml(note.displayName)}</span><span>·</span><span>${timeAgo(note.createdAt)}</span></div>
          </div>
        </div>
        <h3 style="font-size:14px; margin-bottom:4px;">Status</h3>
        <div class="timeline">
          ${note.statusHistory.map((h) => `
            <div class="tstep">
              <div class="tlabel">${h.status.replace('_',' ')}</div>
              <div class="ttime">${new Date(h.at).toLocaleString()}</div>
              ${h.message ? `<div class="tmsg">${escapeHtml(h.message)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('vote-btn').addEventListener('click', async () => {
        await api(`/api/board/${businessId}/notes/${noteId}/vote`, { method: 'POST', body: JSON.stringify({ deviceId: getDeviceId() }) });
        renderDetail(noteId);
      });
    } catch {
      document.getElementById('detail-page').innerHTML = `<div class="empty">Couldn't load this note.</div>`;
    }
  }

  boot();
</script>
