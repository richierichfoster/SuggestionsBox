<body>
  <!-- This page exists purely so the link preview (iMessage/SMS/Slack/etc.)
       shows the team-specific image and copy above — board.html itself is
       shared between customer and staff view via a ?staff=1 query param at
       runtime, so it can't have its own static preview image. Crawlers
       read the meta tags above and stop there; real visitors get bounced
       straight through to the actual team board via the script below. -->
  <noscript>
    <p>Follow the link from your manager to open the team board.</p>
  </noscript>
  <p id="fallback" style="display:none;">Redirecting to the team board… if nothing happens, <a id="fallback-link" href="board.html?staff=1">tap here</a>.</p>

<script>
  const params = new URLSearchParams(window.location.search);
  const businessId = params.get('business');
  const dest = businessId
    ? `board.html?business=${encodeURIComponent(businessId)}&staff=1`
    : 'board.html?staff=1';

  document.getElementById('fallback-link').href = dest;
  document.getElementById('fallback').style.display = 'block';

  window.location.replace(dest);
</script>
</body>
